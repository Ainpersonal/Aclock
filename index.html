<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Analog & Kalender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="topbar">
            <div class="brand">
                <div class="brand_name">Makes Tech</div>
                <div class="brand_tag">Clock & Calendar</div>
            </div>
            
            <div class="readout">
                <div id="digital-time" class="readout_time"></div>
                <div id="digital-date" class="readout_date"></div>
            </div>

            <div class="controls">
                <div class="theme-switch" aria-label="color theme">
                    <button class="theme-btn" data-theme="ocean" type="button">Ocean</button>
                    <button class="theme-btn" data-theme="sunset" type="button">Sunset</button>
                    <button class="theme-btn" data-theme="forest" type="button">Forest</button>
                </div>
                <div class="mode-switch" role="button" tabindex="0">Dark Mode</div>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="clock">
                <label style="--i: 1"> <span>1</span></label>
                <label style="--i: 2"> <span>2</span></label>
                <label style="--i: 3"> <span>3</span></label>
                <label style="--i: 4"> <span>4</span></label>
                <label style="--i: 5"> <span>5</span></label>
                <label style="--i: 6"> <span>6</span></label>
                <label style="--i: 7"> <span>7</span></label>
                <label style="--i: 8"> <span>8</span></label>
                <label style="--i: 9"> <span>9</span></label>
                <label style="--i: 10"> <span>10</span></label>
                <label style="--i: 11"> <span>11</span></label>
                <label style="--i: 12"> <span>12</span></label>
                
                <div class="indicator">
                    <span class="hand hour"></span>
                    <span class="hand minute"></span>
                    <span class="hand second"></span>
                </div>
            </div>

            <div class="calendar">
                <div class="calendar-header">
                    <button id="prev-month" class="calendar-btn">&lt;</button>
                    <h2 id="month-year"></h2>
                    <button id="next-month" class="calendar-btn">&gt;</button>
                </div>
                <div class="calendar-weekdays">
                    <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
                </div>
                <div class="calendar-days" id="calendar-days">
                </div>
            </div>

            <div class="notes-container">
                <div class="notes-header">
                    <h2>Quick Notes</h2>
                    <button id="download-notes" class="theme-btn" title="Download as .txt">
                        Unduh .txt
                    </button>
                </div>
                <textarea id="notes-area" placeholder="Tulis catatanmu di sini..."></textarea>
                <div class="notes-footer">
                    <span id="save-status"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
